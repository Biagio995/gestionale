services:
  postgres:
    image: postgres:16-alpine
    container_name: gestionale-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestionale
      POSTGRES_PASSWORD: gestionale
      POSTGRES_DB: gestionale
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
