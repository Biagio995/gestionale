name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gestionale
          POSTGRES_PASSWORD: gestionale
          POSTGRES_DB: gestionale
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gestionale"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://gestionale:gestionale@localhost:5432/gestionale
      JWT_SECRET: ci-test-secret-min-32-chars-long
      CORS_ORIGIN: http://localhost:5173
      APP_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        run: npm run migrate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend tests
        working-directory: backend
        run: npm test
