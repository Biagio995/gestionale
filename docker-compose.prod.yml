# Deploy completo senza Render/Netlify: un solo server con Docker.
#
# Avvio:
#   cp .env.prod.example .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# App: http://localhost (porta 8090 di default; 8080 spesso occupata)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestionale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestionale}
      POSTGRES_DB: ${POSTGRES_DB:-gestionale}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gestionale}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestionale}:${POSTGRES_PASSWORD:-gestionale}@postgres:5432/${POSTGRES_DB:-gestionale}
      JWT_SECRET: ${JWT_SECRET:?Imposta JWT_SECRET in .env.prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${APP_URL:-http://localhost:8090}
      APP_URL: ${APP_URL:-http://localhost:8090}
      SDI_MODE: simulated
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Espone l'API per Netlify proxy / Cloudflare Tunnel (porta 3010)
      - '${API_PORT:-3010}:3000'

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ''
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8090}:80'
    depends_on:
      - api

volumes:
  postgres_data_prod:
