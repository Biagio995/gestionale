# Build frontend + genera dist/_redirects con proxy API
[build]
  base = "frontend"
  command = "npm ci && npm run build:netlify"
  publish = "dist"

# Variabili richieste in Netlify → Site configuration → Environment variables:
#   NETLIFY_API_PROXY_URL = https://tuo-backend-pubblico.com  (consigliato)
#   VITE_API_URL            = lasciare vuoto / non impostare
# Poi: Deploys → Trigger deploy → Clear cache and deploy site
#
# I redirect API + SPA sono scritti in dist/_redirects dallo script write-netlify-redirects.mjs
